---
# ============================================================================
# VaLLM Production Deployment for Azure AKS
# ============================================================================
# This deployment includes:
# - Highly scalable deployment with HPA
# - ServiceAccount with Managed Identity
# - Data pipeline CronJobs for Azure Blob Storage and URL datasets
# - Production-ready configurations
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: vallm-production
  labels:
    name: vallm-production
    environment: production
---
# ============================================================================
# ServiceAccount with Azure Managed Identity
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vallm-service-account
  namespace: vallm-production
  annotations:
    azure.workload.identity/client-id: "MANAGED_IDENTITY_CLIENT_ID"
    # Replace with your Azure Managed Identity Client ID
automountServiceAccountToken: true
---
# ============================================================================
# ConfigMap for Application Configuration
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vallm-config
  namespace: vallm-production
data:
  ENVIRONMENT: "production"
  PORT: "8000"
  HOST: "0.0.0.0"
  VALLM_AUTO_PRECOMPUTE: "true"
  VALLM_AUTO_TRAIN: "false"
  USE_CUDA: "false"
  AZURE_STORAGE_ACCOUNT: "vallmstorage"
  AZURE_STORAGE_CONTAINER: "datasets"
  # Database Configuration
  DATABASE_HOST: "vallm-postgresql.vallm-production.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "vallm"
  # Redis Configuration
  REDIS_HOST: "vallm-redis.vallm-production.svc.cluster.local"
  REDIS_PORT: "6379"
  # Rate Limiting
  VALLM_TENANT_RATE_LIMIT_ENABLED: "true"
  VALLM_DEFAULT_TPM_LIMIT: "1000000"
  VALLM_DEFAULT_RPM_LIMIT: "100"
  # Lifecycle Hooks
  VALLM_CLEANUP_INTERVAL_SECONDS: "300"
  VALLM_HEALTH_PROBE_INTERVAL_SECONDS: "60"
  VALLM_DELETED_MODEL_RETENTION_DAYS: "30"
  # Data Pipeline Configuration
  DATA_PIPELINE_ENABLED: "true"
  AZURE_STORAGE_ACCOUNT: "vallmstorage"
  DATA_DOWNLOAD_INTERVAL: "0 2 * * *"  # Daily at 2 AM
  # Monitoring
  PROMETHEUS_ENABLED: "true"
---
# ============================================================================
# Secret for Sensitive Data
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: vallm-secrets
  namespace: vallm-production
type: Opaque
stringData:
  # Database credentials (use Azure Key Vault in production)
  DATABASE_USER: "vallm_user"
  DATABASE_PASSWORD: "CHANGE_ME_USE_KEY_VAULT"
  # Redis password
  REDIS_PASSWORD: "CHANGE_ME_USE_KEY_VAULT"
  # API Keys (use Azure Key Vault in production)
  GOOGLE_API_KEY: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  APOLLO_API_KEY: ""
---
# ============================================================================
# PersistentVolumeClaim for Data Storage (Azure Files)
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vallm-data-pvc
  namespace: vallm-production
spec:
  accessModes:
    - ReadWriteMany  # Azure Files supports RWX
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 100Gi
---
# ============================================================================
# PersistentVolumeClaim for Logs
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vallm-logs-pvc
  namespace: vallm-production
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 20Gi
---
# ============================================================================
# Deployment - Main Application
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vallm-api
  namespace: vallm-production
  labels:
    app: vallm-api
    version: v1
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vallm-api
  template:
    metadata:
      labels:
        app: vallm-api
        version: v1
        component: api
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vallm-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: vallm-api
        image: YOUR_ACR_REGISTRY.azurecr.io/vallm:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: vallm-config
        env:
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: DATABASE_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: REDIS_PASSWORD
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: GOOGLE_API_KEY
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: OPENAI_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        - name: APOLLO_API_KEY
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: APOLLO_API_KEY
              optional: true
        - name: AZURE_CLIENT_ID
          value: "MANAGED_IDENTITY_CLIENT_ID"
        - name: AZURE_TENANT_ID
          value: "YOUR_AZURE_TENANT_ID"
        - name: AZURE_STORAGE_ACCOUNT
          valueFrom:
            configMapKeyRef:
              name: vallm-config
              key: AZURE_STORAGE_ACCOUNT
        - name: AZURE_STORAGE_CONTAINER
          valueFrom:
            configMapKeyRef:
              name: vallm-config
              key: AZURE_STORAGE_CONTAINER
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            ephemeral-storage: "10Gi"
          limits:
            memory: "8Gi"
            cpu: "4000m"
            ephemeral-storage: "20Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
        - name: logs-storage
          mountPath: /app/logs
        - name: tmp-storage
          mountPath: /tmp
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: vallm-data-pvc
      - name: logs-storage
        persistentVolumeClaim:
          claimName: vallm-logs-pvc
      - name: tmp-storage
        emptyDir:
          sizeLimit: 5Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vallm-api
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        kubernetes.io/os: linux
        agentpool: compute
      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "compute"
        effect: "NoSchedule"
---
# ============================================================================
# Horizontal Pod Autoscaler (HPA)
# ============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vallm-api-hpa
  namespace: vallm-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vallm-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
---
# ============================================================================
# PodDisruptionBudget
# ============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vallm-api-pdb
  namespace: vallm-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: vallm-api
---
# ============================================================================
# Service - LoadBalancer
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: vallm-api-service
  namespace: vallm-production
  labels:
    app: vallm-api
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health"
    service.beta.kubernetes.io/azure-load-balancer-internal: "false"
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  selector:
    app: vallm-api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
# ============================================================================
# Ingress (Alternative to LoadBalancer)
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vallm-api-ingress
  namespace: vallm-production
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/health-probe-path: "/health"
    appgw.ingress.kubernetes.io/health-probe-interval: "30"
    appgw.ingress.kubernetes.io/health-probe-timeout: "10"
    appgw.ingress.kubernetes.io/health-probe-unhealthy-threshold: "3"
spec:
  tls:
  - hosts:
    - api.vallm.example.com
    secretName: vallm-tls-secret
  rules:
  - host: api.vallm.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vallm-api-service
            port:
              number: 80
---
# ============================================================================
# Network Policy
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vallm-api-netpol
  namespace: vallm-production
spec:
  podSelector:
    matchLabels:
      app: vallm-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: vallm-api
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: vallm-production
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
# ============================================================================
# Redis Deployment
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vallm-redis
  namespace: vallm-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vallm-redis
  template:
    metadata:
      labels:
        app: vallm-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --requirepass
        - $(REDIS_PASSWORD)
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vallm-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir:
          sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vallm-redis
  namespace: vallm-production
spec:
  selector:
    app: vallm-redis
  ports:
  - port: 6379
    targetPort: 6379
---
# ============================================================================
# Data Pipeline: Azure Blob Storage Dataset Fetcher CronJob
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vallm-azure-blob-fetcher
  namespace: vallm-production
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vallm-data-pipeline
            component: blob-fetcher
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: vallm-service-account
          restartPolicy: OnFailure
          containers:
          - name: blob-fetcher
            image: YOUR_ACR_REGISTRY.azurecr.io/vallm:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting Azure Blob Storage dataset fetch..."
              python /app/scripts/data_pipeline/azure_blob_fetcher.py \
                --account ${AZURE_STORAGE_ACCOUNT} \
                --container ${AZURE_STORAGE_CONTAINER} \
                --prefix datasets/ \
                --destination /app/data/datasets \
                --max-size 50GB
              echo "Azure Blob Storage dataset fetch completed"
            env:
            - name: AZURE_STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: vallm-config
                  key: AZURE_STORAGE_ACCOUNT
            - name: AZURE_STORAGE_CONTAINER
              valueFrom:
                configMapKeyRef:
                  name: vallm-config
                  key: AZURE_STORAGE_CONTAINER
            - name: AZURE_CLIENT_ID
              value: "MANAGED_IDENTITY_CLIENT_ID"
            resources:
              requests:
                memory: "2Gi"
                cpu: "1000m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
            volumeMounts:
            - name: data-storage
              mountPath: /app/data
          volumes:
          - name: data-storage
            persistentVolumeClaim:
              claimName: vallm-data-pvc
---
# ============================================================================
# Data Pipeline: URL Dataset Fetcher CronJob
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vallm-url-dataset-fetcher
  namespace: vallm-production
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vallm-data-pipeline
            component: url-fetcher
        spec:
          serviceAccountName: vallm-service-account
          restartPolicy: OnFailure
          containers:
          - name: url-fetcher
            image: YOUR_ACR_REGISTRY.azurecr.io/vallm:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting URL dataset fetch..."
              python /app/scripts/data_pipeline/url_fetcher.py \
                --urls-file /app/config/dataset_urls.txt \
                --destination /app/data/datasets \
                --max-size 50GB \
                --verify-ssl
              echo "URL dataset fetch completed"
            resources:
              requests:
                memory: "2Gi"
                cpu: "1000m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
            volumeMounts:
            - name: data-storage
              mountPath: /app/data
            - name: config
              mountPath: /app/config
          volumes:
          - name: data-storage
            persistentVolumeClaim:
              claimName: vallm-data-pvc
          - name: config
            configMap:
              name: vallm-dataset-urls
---
# ============================================================================
# ConfigMap for Dataset URLs
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vallm-dataset-urls
  namespace: vallm-production
data:
  dataset_urls.txt: |
    # Dataset URLs (one per line)
    # Format: URL|DESTINATION_FILENAME|CHECKSUM (optional)
    https://example.com/datasets/incidents.csv|incidents.csv|sha256:abc123
    https://example.com/datasets/resources.csv|resources.csv
    https://example.com/datasets/configs.tar.gz|configs.tar.gz
---
# ============================================================================
# Data Pipeline: Dataset Processor Job
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vallm-dataset-processor
  namespace: vallm-production
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM UTC (after fetchers)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vallm-data-pipeline
            component: processor
        spec:
          serviceAccountName: vallm-service-account
          restartPolicy: OnFailure
          containers:
          - name: processor
            image: YOUR_ACR_REGISTRY.azurecr.io/vallm:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting dataset processing..."
              python /app/scripts/data_pipeline/process_datasets.py \
                --source /app/data/datasets \
                --output /app/data/processed \
                --format csv \
                --validate \
                --deduplicate
              echo "Dataset processing completed"
            resources:
              requests:
                memory: "4Gi"
                cpu: "2000m"
              limits:
                memory: "8Gi"
                cpu: "4000m"
            volumeMounts:
            - name: data-storage
              mountPath: /app/data
          volumes:
          - name: data-storage
            persistentVolumeClaim:
              claimName: vallm-data-pvc
---
# ============================================================================
# ServiceMonitor for Prometheus (if using Prometheus Operator)
# ============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vallm-api-monitor
  namespace: vallm-production
  labels:
    app: vallm-api
spec:
  selector:
    matchLabels:
      app: vallm-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
