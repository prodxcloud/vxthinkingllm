apiVersion: apps/v1
kind: Deployment
metadata:
  name: va-llm-v1
  namespace: va-llm-v1
  labels:
    app: va-llm-v1
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: va-llm-v1
  template:
    metadata:
      labels:
        app: va-llm-v1
        version: v1
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      containers:
      - name: va-llm-v1
        image: docker.io/valtunox/va-llm-v1:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: VALLM_AUTO_PRECOMPUTE
          value: "true"
        - name: VALLM_AUTO_TRAIN
          value: "false"
        - name: USE_CUDA
          value: "false"
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: database-host
              optional: true
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: database-port
              optional: true
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: database-name
              optional: true
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: database-user
              optional: true
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: database-password
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: google-api-key
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: anthropic-api-key
              optional: true
        - name: APOLLO_API_KEY
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: apollo-api-key
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: aws-access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: aws-secret-access-key
              optional: true
        - name: AWS_REGION
          value: "us-east-1"
        - name: S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: va-llm-v1-secrets
              key: s3-bucket
              optional: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
        - name: logs-storage
          mountPath: /app/logs
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: va-llm-v1-data-pvc
      - name: logs-storage
        emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: va-llm-v1-data-pvc
  namespace: va-llm-v1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: managed-premium
