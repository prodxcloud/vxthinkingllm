trigger:
  branches:
    include:
      - main
      - develop
      - staging

pr:
  branches:
    include:
      - main
      - develop
      - staging

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'va-llm-v1'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.SourceVersion)'
  acrName: '$(ACR_NAME)'
  aksClusterName: '$(AKS_CLUSTER_NAME)'
  aksResourceGroup: '$(AKS_RESOURCE_GROUP)'
  vmHost: '$(VM_HOST)'
  vmUser: '$(VM_USER)'

stages:
  - stage: BuildAndPush
    displayName: Build and Push Docker Image
    jobs:
      - job: Build
        displayName: Build Docker Image
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Build and push to ACR
            inputs:
              command: buildAndPush
              containerRegistry: 'ACR_SERVICE_CONNECTION'
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              buildContext: '.'
              tags: |
                $(tag)
                latest

  - stage: DeployToVM
    displayName: Deploy to Virtual Machine
    dependsOn: BuildAndPush
    condition: and(succeeded(), eq(variables['DeployTarget'], 'VM'))
    jobs:
      - deployment: VMDeploy
        displayName: Deploy to VM
        environment: 'VM-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - task: SSH@0
                  displayName: Copy deployment files to VM
                  inputs:
                    sshEndpoint: 'VM_SSH_CONNECTION'
                    runOptions: 'commands'
                    commands: |
                      mkdir -p /home/$(vmUser)/va-llm-v1
                      cd /home/$(vmUser)/va-llm-v1
                
                - task: CopyFilesOverSSH@0
                  displayName: Copy docker-compose and env files
                  inputs:
                    sshEndpoint: 'VM_SSH_CONNECTION'
                    sourceFolder: '$(System.DefaultWorkingDirectory)'
                    contents: |
                      docker-compose.yml
                    targetFolder: '/home/$(vmUser)/va-llm-v1'
                
                - task: SSH@0
                  displayName: Deploy on VM
                  inputs:
                    sshEndpoint: 'VM_SSH_CONNECTION'
                    runOptions: 'commands'
                    commands: |
                      cd /home/$(vmUser)/va-llm-v1
                      echo "$(ACR_PASSWORD)" | docker login $(acrName).azurecr.io -u $(ACR_USERNAME) --password-stdin
                      docker pull $(acrName).azurecr.io/$(imageRepository):latest
                      docker-compose down || true
                      docker-compose up -d
                      sleep 10
                      curl -f http://localhost:8000/health || exit 1

  - stage: DeployToAKS
    displayName: Deploy to Azure Kubernetes Service (AKS)
    dependsOn: BuildAndPush
    condition: and(succeeded(), eq(variables['DeployTarget'], 'K8S'))
    jobs:
      - deployment: AKSDeploy
        displayName: Deploy to AKS
        environment: 'AKS-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - task: AzureCLI@2
                  displayName: Install kubectl
                  inputs:
                    azureSubscription: 'AZURE_SERVICE_CONNECTION'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks install-cli
                
                - task: AzureCLI@2
                  displayName: Get AKS credentials
                  inputs:
                    azureSubscription: 'AZURE_SERVICE_CONNECTION'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksClusterName) --overwrite-existing
                
                - task: Kubernetes@1
                  displayName: Deploy to Kubernetes
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: 'AZURE_SERVICE_CONNECTION'
                    azureResourceGroup: '$(aksResourceGroup)'
                    kubernetesCluster: '$(aksClusterName)'
                    namespace: 'default'
                    command: 'apply'
                    arguments: '-f k8s/'
                    secretType: 'dockerRegistry'
                    containerRegistryType: 'Azure Container Registry'
                    azureContainerRegistry: '$(acrName).azurecr.io'
                
                - task: Kubernetes@1
                  displayName: Verify deployment
                  inputs:
                    connectionType: 'Azure Resource Manager'
                    azureSubscriptionEndpoint: 'AZURE_SERVICE_CONNECTION'
                    azureResourceGroup: '$(aksResourceGroup)'
                    kubernetesCluster: '$(aksClusterName)'
                    namespace: 'default'
                    command: 'get'
                    arguments: 'deployments,services -l app=va-llm-v1'
